apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"
apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../../node_modules/react-native/cli.js
    // cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. Default is "debug", "debugOptimized".
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "liteDebugOptimized", "prodDebug", "prodDebugOptimized"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = true
def googleMapsApiKey = project.findProperty("GOOGLE_MAPS_API_KEY") ?: ""
def appDebugKeystore = file('debug.keystore')
def userDebugKeystore = new File(System.getProperty("user.home"), ".android/debug.keystore")
def debugKeystoreFile = appDebugKeystore.exists() ? appDebugKeystore : userDebugKeystore
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("keystore.properties")
def hasReleaseKeystore = keystorePropertiesFile.exists()
if (hasReleaseKeystore) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def debugAbiFilters = ["armeabi-v7a", "arm64-v8a", "x86", "x86_64"]
def releaseAbiFilters = ["armeabi-v7a", "arm64-v8a", "x86", "x86_64"]
def isReleaseTask = gradle.startParameter.taskNames.any { it.toLowerCase().contains("release") }
def targetAbiFilters = isReleaseTask ? releaseAbiFilters : debugAbiFilters

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.crmmobilenative"
    splits {
        abi {
            enable true
            reset()
            universalApk true
            include(*targetAbiFilters)
        }
    }
    packaging {
        jniLibs {
            // Compress native libraries inside the APK to reduce the download size.
            useLegacyPackaging true
        }
    }
    defaultConfig {
        applicationId "com.crmmobilenative"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "4.0"
        manifestPlaceholders = [GOOGLE_MAPS_API_KEY: googleMapsApiKey]
    }
    signingConfigs {
        debug {
            storeFile debugKeystoreFile
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        if (hasReleaseKeystore) {
            release {
                storeFile file(keystoreProperties["storeFile"])
                storePassword keystoreProperties["storePassword"]
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig hasReleaseKeystore ? signingConfigs.release : signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")
    implementation("androidx.work:work-runtime-ktx:2.10.0")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

gradle.projectsEvaluated {
    def prefabReleaseDependencies = [
        ":react-native-vision-camera:prefabReleasePackage",
    ]
    def generatedAutolinkingCmake = file("$buildDir/generated/autolinking/src/main/jni/Android-autolinking.cmake")
    def generatedAutolinkingCpp = file("$buildDir/generated/autolinking/src/main/jni/autolinking.cpp")

    tasks.matching { it.name.startsWith("configureCMakeRelWithDebInfo") }.configureEach {
        prefabReleaseDependencies.each { dependsOn(it) }
    }

    tasks.matching { it.name == "generateAutolinkingNewArchitectureFiles" }.configureEach {
        doLast {
            if (!generatedAutolinkingCmake.exists()) {
                return
            }

            def filteredLines = generatedAutolinkingCmake.readLines().findAll { line ->
                !line.contains("react-native-safe-area-context/android/src/main/jni/") &&
                !line.contains("react-native-screens/android/src/main/jni/") &&
                line.trim() != "react_codegen_safeareacontext" &&
                line.trim() != "react_codegen_rnscreens"
            }

            generatedAutolinkingCmake.text = filteredLines.join(System.lineSeparator()) + System.lineSeparator()

            if (!generatedAutolinkingCpp.exists()) {
                return
            }

            def cppText = generatedAutolinkingCpp.text
            def cppReplacements = [
                ~/(?m)^#include <safeareacontext\.h>\R?/,
                ~/(?m)^#include <react\/renderer\/components\/safeareacontext\/ComponentDescriptors\.h>\R?/,
                ~/(?m)^#include <rnscreens\.h>\R?/,
                ~/(?m)^#include <react\/renderer\/components\/rnscreens\/ComponentDescriptors\.h>\R?/,
                ~/(?ms)auto module_safeareacontext = safeareacontext_ModuleProvider\(moduleName, params\);\Rif \(module_safeareacontext != nullptr\) \{\Rreturn module_safeareacontext;\R\}\R?/,
                ~/(?ms)auto module_rnscreens = rnscreens_ModuleProvider\(moduleName, params\);\Rif \(module_rnscreens != nullptr\) \{\Rreturn module_rnscreens;\R\}\R?/,
                ~/(?m)^providerRegistry->add\(concreteComponentDescriptorProvider<RNCSafeAreaProviderComponentDescriptor>\(\)\);\R?/,
                ~/(?m)^providerRegistry->add\(concreteComponentDescriptorProvider<RNCSafeAreaViewComponentDescriptor>\(\)\);\R?/,
                ~/(?m)^providerRegistry->add\(concreteComponentDescriptorProvider<RNSFullWindowOverlayComponentDescriptor>\(\)\);\R?/,
                ~/(?m)^providerRegistry->add\(concreteComponentDescriptorProvider<RNSScreenContainerComponentDescriptor>\(\)\);\R?/,
                ~/(?m)^providerRegistry->add\(concreteComponentDescriptorProvider<RNSScreenNavigationContainerComponentDescriptor>\(\)\);\R?/,
                ~/(?m)^providerRegistry->add\(concreteComponentDescriptorProvider<RNSScreenStackHeaderConfigComponentDescriptor>\(\)\);\R?/,
                ~/(?m)^providerRegistry->add\(concreteComponentDescriptorProvider<RNSScreenStackHeaderSubviewComponentDescriptor>\(\)\);\R?/,
                ~/(?m)^providerRegistry->add\(concreteComponentDescriptorProvider<RNSScreenStackComponentDescriptor>\(\)\);\R?/,
                ~/(?m)^providerRegistry->add\(concreteComponentDescriptorProvider<RNSSearchBarComponentDescriptor>\(\)\);\R?/,
                ~/(?m)^providerRegistry->add\(concreteComponentDescriptorProvider<RNSScreenComponentDescriptor>\(\)\);\R?/,
                ~/(?m)^providerRegistry->add\(concreteComponentDescriptorProvider<RNSScreenFooterComponentDescriptor>\(\)\);\R?/,
                ~/(?m)^providerRegistry->add\(concreteComponentDescriptorProvider<RNSScreenContentWrapperComponentDescriptor>\(\)\);\R?/,
                ~/(?m)^providerRegistry->add\(concreteComponentDescriptorProvider<RNSModalScreenComponentDescriptor>\(\)\);\R?/,
                ~/(?m)^providerRegistry->add\(concreteComponentDescriptorProvider<RNSTabsHostComponentDescriptor>\(\)\);\R?/,
                ~/(?m)^providerRegistry->add\(concreteComponentDescriptorProvider<RNSSafeAreaViewComponentDescriptor>\(\)\);\R?/
            ]

            cppReplacements.each { pattern ->
                cppText = cppText.replaceAll(pattern, "")
            }

            generatedAutolinkingCpp.text = cppText
        }
    }
}

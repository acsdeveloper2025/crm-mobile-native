name: Android Release

on:
  push:
    tags:
      - "v4*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v4.0.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect project toolchain
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          root = Path(".")
          package_json = json.loads((root / "package.json").read_text(encoding="utf-8"))
          build_gradle = (root / "android/build.gradle").read_text(encoding="utf-8")
          wrapper_props = (root / "android/gradle/wrapper/gradle-wrapper.properties").read_text(encoding="utf-8")

          nvmrc = root / ".nvmrc"
          if nvmrc.exists():
              node_version = nvmrc.read_text(encoding="utf-8").strip()
          else:
              engine = package_json.get("engines", {}).get("node", "")
              match = re.search(r"(\d+(?:\.\d+){0,2})", engine)
              node_version = match.group(1) if match else "22"

          patterns = {
              "compile_sdk": r"compileSdkVersion = (\d+)",
              "build_tools_version": r'buildToolsVersion = "([^"]+)"',
              "ndk_version": r'ndkVersion = "([^"]+)"',
              "agp_version": r"com\.android\.tools\.build:gradle:([0-9.]+)",
              "gradle_version": r"gradle-([0-9][^-/]*)-bin\.zip",
          }

          sources = {
              "compile_sdk": build_gradle,
              "build_tools_version": build_gradle,
              "ndk_version": build_gradle,
              "agp_version": build_gradle,
              "gradle_version": wrapper_props,
          }

          values = {"node_version": node_version}
          for key, pattern in patterns.items():
              match = re.search(pattern, sources[key])
              if not match:
                  raise SystemExit(f"Missing {key} in project configuration")
              values[key] = match.group(1)

          agp_major = int(values["agp_version"].split(".", 1)[0])
          values["java_version"] = "17" if agp_major >= 8 else "11"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              for key, value in values.items():
                  fh.write(f"{key}={value}\n")
          PY

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.detect.outputs.node_version }}
          cache: "npm"

      - name: Derive release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION_NAME="${RELEASE_TAG#v}"
          VERSION_CODE="$(date +%s)"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ steps.detect.outputs.java_version }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager \
            "platform-tools" \
            "platforms;android-${{ steps.detect.outputs.compile_sdk }}" \
            "build-tools;${{ steps.detect.outputs.build_tools_version }}" \
            "ndk;${{ steps.detect.outputs.ndk_version }}"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Restore signing and Firebase files
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          test -n "$GOOGLE_SERVICES_JSON"

          mkdir -p android/app

          if [[ -n "$ANDROID_KEYSTORE_BASE64" && -n "$ANDROID_KEYSTORE_PASSWORD" && -n "$ANDROID_KEY_ALIAS" && -n "$ANDROID_KEY_PASSWORD" ]]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
            printf '%s\n' \
              "storeFile=release.keystore" \
              "storePassword=$ANDROID_KEYSTORE_PASSWORD" \
              "keyAlias=$ANDROID_KEY_ALIAS" \
              "keyPassword=$ANDROID_KEY_PASSWORD" \
              > android/keystore.properties
          else
            echo "Release keystore secrets not set. Build will use the project's fallback signing configuration."
          fi

          printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Build release artifacts
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew clean assembleRelease bundleRelease \
            -PversionName=${{ steps.version.outputs.version_name }} \
            -PversionCode=${{ steps.version.outputs.version_code }}

      - name: Prepare release artifacts
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version_name }}"
          mkdir -p release-artifacts

          test -f android/app/build/outputs/apk/release/app-universal-release.apk
          test -f android/app/build/outputs/bundle/release/app-release.aab

          cp android/app/build/outputs/apk/release/app-universal-release.apk \
            "release-artifacts/crm-mobile-native-v${VERSION}.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab \
            "release-artifacts/crm-mobile-native-v${VERSION}.aab"

          echo "apk_name=crm-mobile-native-v${VERSION}.apk" >> "$GITHUB_OUTPUT"
          echo "aab_name=crm-mobile-native-v${VERSION}.aab" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          {
            echo "release_files<<EOF"
            echo "release-artifacts/crm-mobile-native-v${VERSION}.apk"
            echo "release-artifacts/crm-mobile-native-v${VERSION}.aab"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crm-mobile-native-${{ steps.artifacts.outputs.release_tag }}-artifacts
          path: release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.artifacts.outputs.release_tag }}
          name: CRM Mobile Native ${{ steps.artifacts.outputs.release_tag }}
          generate_release_notes: true
          files: ${{ steps.artifacts.outputs.release_files }}

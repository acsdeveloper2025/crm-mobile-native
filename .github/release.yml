changelog:
  categories:
    - title: Mobile Features
      labels:
        - feature
        - enhancement
        - mobile
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Maintenance
      labels:
        - chore
        - ci
        - dependencies
        - docs
  exclude:
    labels:
      - skip-changelog
  change-template: "- $TITLE (#$NUMBER)"
  template: |
    ## What's Changed

    $CHANGES
